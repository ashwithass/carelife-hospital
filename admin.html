<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | CareLife Hospital</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;}
body{background:#f2f6ff;color:#333;}

/* LOGIN */
.login-box{
    max-width:380px;margin:120px auto;background:#fff;
    padding:35px;border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    text-align:center;
}
.login-box h2{color:#1976d2;margin-bottom:20px;}
.login-box input{
    width:100%;padding:12px;margin-bottom:14px;
    border-radius:10px;border:1px solid #ccc;
}
.login-box button{
    width:100%;padding:12px;border:none;
    border-radius:30px;background:#1976d2;
    color:#fff;font-size:15px;cursor:pointer;
}
.msg{margin-top:10px;color:red;font-weight:600;}

/* HEADER (same as doctor page) */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 40px;
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.brand{
    display:flex;
    align-items:center;
    gap:15px;
}

.brand img{
    width:48px;
    height:48px;
    border-radius:50%;
    border:3px solid #1976d2;
    padding:5px;
    background:#fff;
}

.brand h1{
    font-size:28px;
    color:#1976d2;
    font-weight:700;
}

.btn{
    padding:10px 18px;border-radius:22px;border:none;
    cursor:pointer;font-weight:600;
}
.logout{background:#d32f2f;color:#fff;}
.clear{background:#555;color:#fff;}

.container{max-width:1200px;margin:40px auto;padding:0 20px;}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;margin-bottom:30px;
}
.card{
    background:#fff;padding:25px;border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    text-align:center;
}
.card h3{font-size:32px;color:#1976d2;}
.card p{margin-top:6px;color:#666;font-weight:600;}

.section{
    background:#fff;padding:25px;border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    margin-bottom:30px;
}

.filters{
    display:flex;gap:15px;flex-wrap:wrap;margin-bottom:15px;
}
.filters input,.filters button{
    padding:10px;border-radius:10px;border:1px solid #ccc;
}

table{width:100%;border-collapse:collapse;}
th,td{padding:12px;border-bottom:1px solid #ddd;text-align:left;}
th{background:#f4f7ff;color:#1976d2;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-box">
    <h2>🔐 Admin Login</h2>
    <input id="adminId" placeholder="Admin ID">
    <input id="adminPass" type="password" placeholder="Password">
    <button onclick="adminLogin()">Login</button>
    <div id="loginMsg" class="msg"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none">

<header class="header">
    <div class="brand">
        <img src="hospital.png" alt="Hospital Logo">
        <h1>CareLife Hospital</h1>
    </div>

    <div>
        <button class="btn clear" onclick="clearAll()">Clear Everything</button>
        <button class="btn logout" onclick="adminLogout()">Logout</button>
    </div>
</header>

<div class="container">

<div class="cards">
    <div class="card"><h3 id="pCount">0</h3><p>Total Patients</p></div>
    <div class="card"><h3 id="aCount">0</h3><p>Total Appointments</p></div>
    <div class="card"><h3 id="guestCount">0</h3><p>Guest Appointments</p></div>
    <div class="card"><h3 id="onCount">0</h3><p>Online</p></div>
    <div class="card"><h3 id="offCount">0</h3><p>Offline</p></div>
    <div class="card"><h3 id="ordCount">0</h3><p>Pharmacy Orders</p></div>
</div>

<div class="section">
<h2>Filter Appointments by Date</h2>
<div class="filters">
    <input type="date" id="fromDate">
    <input type="date" id="toDate">
    <button onclick="applyFilter()">Apply</button>
    <button onclick="resetFilter()">Reset</button>
</div>
</div>

<div class="section">
<h2>Appointments</h2>
<table>
<thead>
<tr><th>User</th><th>ID</th><th>Issue</th><th>Date</th><th>Mode</th></tr>
</thead>
<tbody id="appointmentTable"></tbody>
</table>
</div>

</div>
</div>

<script>
let ALL_APPOINTMENTS = [];

if(localStorage.getItem("adminLogged")==="true") showDashboard();

function adminLogin(){
    if(adminId.value==="ACL001" && adminPass.value==="admin"){
        localStorage.setItem("adminLogged","true");
        showDashboard();
    }else loginMsg.innerText="Invalid credentials";
}

async function showDashboard(){
    loginPage.style.display="none";
    dashboard.style.display="block";

    const patients = await fetch("http://localhost:5000/api/admin/users").then(r=>r.json());
    const appointments = await fetch("http://localhost:5000/api/appointments").then(r=>r.json());
    const orders = await fetch("http://localhost:5000/api/admin/orders").then(r=>r.json());

    ALL_APPOINTMENTS = appointments;
    renderDashboard(appointments, patients.length, orders.length);
}

function renderDashboard(apps, patientCount, orderCount){
    pCount.innerText = patientCount;
    aCount.innerText = apps.length;
    guestCount.innerText = apps.filter(a=>a.pid==="GUEST").length;
    onCount.innerText = apps.filter(a=>a.mode==="Online").length;
    offCount.innerText = apps.filter(a=>a.mode==="Offline").length;
    ordCount.innerText = orderCount;

    appointmentTable.innerHTML="";
    apps.forEach(a=>{
        appointmentTable.innerHTML+=`
        <tr>
            <td>${a.pid==="GUEST"?"Guest User":"Registered"}</td>
            <td>${a.pid==="GUEST"?"—":a.pid}</td>
            <td>${a.issue}</td>
            <td>${a.date} ${a.time}</td>
            <td>${a.mode}</td>
        </tr>`;
    });
}

function applyFilter(){
    const from = fromDate.value;
    const to = toDate.value;

    let filtered = [...ALL_APPOINTMENTS];
    if(from) filtered = filtered.filter(a=>a.date >= from);
    if(to) filtered = filtered.filter(a=>a.date <= to);

    renderDashboard(filtered, pCount.innerText, ordCount.innerText);
}

function resetFilter(){
    fromDate.value="";
    toDate.value="";
    renderDashboard(ALL_APPOINTMENTS, pCount.innerText, ordCount.innerText);
}

function clearAll(){
    alert("Backend clear not implemented");
}

function adminLogout(){
    localStorage.removeItem("adminLogged");
    location.reload();
}
</script>

</body>
</html>
