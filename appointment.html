<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Appointment | CareLife</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#e8f2ff,#fff);
color:#333;
animation:fadeIn .7s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#fff;
box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-size:22px;
font-weight:700;
color:#1976d2;
}

.logo img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:3px solid #1976d2;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.back-btn{
width:38px;
height:38px;
border-radius:50%;
border:none;
background:#1976d2;
color:white;
font-size:18px;
cursor:pointer;
}

.title-section{
text-align:center;
padding:40px 20px;
}

.container{
display:flex;
justify-content:center;
padding-bottom:60px;
}

.form-box{
width:420px;
background:#fff;
padding:40px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,.25);
}

input,textarea,select{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

.time-row{
display:flex;
gap:10px;
}

.submit-btn{
width:100%;
padding:15px;
background:#1976d2;
color:#fff;
border:none;
border-radius:30px;
cursor:pointer;
margin-bottom:10px;
}

.message{
text-align:center;
margin-top:15px;
font-weight:600;
}

.error{color:#d32f2f;}
.success{color:#2e7d32;}

</style>

</head>

<body>

<header class="header">
<div style="display:flex;align-items:center;gap:14px">

<button class="back-btn" onclick="goBack()">←</button>

<div class="logo">
<img src="hospital.png">
CareLife
</div>

</div>
</header>

<div class="title-section">
<h2>Book Appointment</h2>
<p>Fill the form below to schedule your consultation</p>
</div>

<div class="container">
<div class="form-box">

<input id="name" placeholder="Patient Name">
<input id="age" placeholder="Age">
<input id="issue" placeholder="Health Issue">
<textarea id="description" placeholder="Describe the issue"></textarea>

<select id="mode">
<option value="">Appointment Mode</option>
<option value="Online">Online</option>
<option value="Offline">Offline</option>
</select>

<input id="phone" placeholder="Mobile Number" style="display:none">
<input id="email" placeholder="Email Address" style="display:none">

<input type="date" id="date">

<div class="time-row">

<select id="hour">
<option value="">HH</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
<option>11</option>
</select>

<select id="minute">
<option value="">MM</option>
<option>00</option>
<option>15</option>
<option>30</option>
<option>45</option>
</select>

<select id="ampm">
<option value="">AM / PM</option>
<option>AM</option>
<option>PM</option>
</select>

</div>

<button class="submit-btn" id="payBtn" onclick="goPayment()">
Pay Doctor Fee ₹200
</button>

<button class="submit-btn" id="bookBtn" onclick="bookAppointment()" disabled>
Book Appointment
</button>

<div class="message" id="msg"></div>

</div>
</div>

<script>

let paymentDone=false;


/* ================= CONTACT FIELD CONTROL ================= */

function updateContactFields(){

const mode=document.getElementById("mode").value;
const phone=document.getElementById("phone");
const email=document.getElementById("email");

if(mode==="Online"){
phone.style.display="block";
email.style.display="block";
}
else if(mode==="Offline"){
phone.style.display="block";
email.style.display="none";
}
else{
phone.style.display="none";
email.style.display="none";
}

}


/* ================= PAYMENT PAGE ================= */

function goPayment(){

const data={
name:document.getElementById("name").value.trim(),
age:document.getElementById("age").value.trim(),
issue:document.getElementById("issue").value.trim(),
description:document.getElementById("description").value.trim(),
mode:document.getElementById("mode").value,
phone:document.getElementById("phone").value.trim(),
email:document.getElementById("email").value.trim(),
date:document.getElementById("date").value,
hour:document.getElementById("hour").value,
minute:document.getElementById("minute").value,
ampm:document.getElementById("ampm").value
};

/* validation */

for(let k in data){
if(!data[k]){
alert("Please fill appointment details before payment");
return;
}
}

localStorage.setItem("appointmentDraft",JSON.stringify(data));

window.location.href="appointpay.html";

}


/* ================= LOAD DATA AFTER PAYMENT ================= */

document.addEventListener("DOMContentLoaded",()=>{

const mode=document.getElementById("mode");
mode.addEventListener("change",updateContactFields);

const draft=JSON.parse(localStorage.getItem("appointmentDraft"));

if(draft){

document.getElementById("name").value=draft.name;
document.getElementById("age").value=draft.age;
document.getElementById("issue").value=draft.issue;
document.getElementById("description").value=draft.description;
document.getElementById("mode").value=draft.mode;
document.getElementById("phone").value=draft.phone;
document.getElementById("email").value=draft.email;
document.getElementById("date").value=draft.date;
document.getElementById("hour").value=draft.hour;
document.getElementById("minute").value=draft.minute;
document.getElementById("ampm").value=draft.ampm;

}

updateContactFields();

/* payment completed */

if(localStorage.getItem("appointPayment")==="done"){

paymentDone=true;

document.getElementById("bookBtn").disabled=false;
document.getElementById("payBtn").innerText="Payment Completed";
document.getElementById("payBtn").disabled=true;

}

});


/* ================= BOOK APPOINTMENT ================= */

function bookAppointment(){

const draft=JSON.parse(localStorage.getItem("appointmentDraft"));

if(!paymentDone){
return show("Please pay doctor fee ₹200 before booking appointment");
}

const timeStr=`${draft.hour}:${draft.minute} ${draft.ampm}`;

fetch("http://localhost:5000/api/appointment",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({

pid:localStorage.getItem("currentUser"),
name:draft.name,
age:draft.age,
issue:draft.issue,
description:draft.description,
mode:draft.mode,
date:draft.date,
time:timeStr,
phone:draft.phone,
email:draft.email

})

})

.then(res=>res.json())

.then(()=>{

document.getElementById("msg").className="message success";
document.getElementById("msg").innerText="✅ Appointment booked successfully!";

document.querySelectorAll(".form-box input, .form-box textarea, .form-box select, .form-box .submit-btn")
.forEach(el=>el.disabled=true);

localStorage.removeItem("appointmentDraft");
localStorage.removeItem("appointPayment");

})

.catch(()=>show("❌ Failed to book appointment"));

}


/* ================= MESSAGE ================= */

function show(t){
document.getElementById("msg").className="message error";
document.getElementById("msg").innerText=t;
}


/* ================= BACK BUTTON ================= */

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
