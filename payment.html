<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | CareLife</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif;}

body{
    background:linear-gradient(135deg,#e8f2ff,#ffffff);
    color:#333;
    animation:fadeIn .7s ease;
}
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    font-size:22px;
    font-weight:700;
    color:#1976d2;
}
.logo img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #1976d2;
}

.back-btn{
    width:38px;
    height:38px;
    border-radius:50%;
    border:none;
    background:#1976d2;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    max-width:600px;
    margin:80px auto;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

.summary{
    background:#f4f7ff;
    padding:18px;
    border-radius:12px;
    margin-bottom:22px;
}

.address-row{
    display:flex;
    gap:12px;
}
.address-row input:first-child{ flex:7; }
.address-row input:last-child{ flex:3; }

input{
    width:100%;
    height:48px;
    padding:0 14px;
    margin-bottom:14px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:14px;
}

.method{
    display:flex;
    flex-direction:column;
    padding:12px 18px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-bottom:12px;
    cursor:pointer;
}
.method.active{
    border:2px solid #1976d2;
    background:#eef4ff;
}

.method input{
    margin-top:10px;
    height:44px;
}

.hidden{display:none}

.confirm-btn{
    width:100%;
    height:48px;
    margin-top:10px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

.success{
    text-align:center;
    color:green;
    margin-top:15px;
    font-weight:600;
}
</style>
</head>

<body>

<header class="header">
    <div style="display:flex;align-items:center;gap:14px">
        <button class="back-btn" onclick="goBack()">←</button>
        <div class="logo">
            <img src="hospital.png" alt="CareLife Logo">
            CareLife
        </div>
    </div>
</header>

<div class="container">
    <h2 style="text-align:center;color:#1976d2;margin-bottom:15px">Payment</h2>

    <div class="summary" id="orderSummary"></div>

    <div class="address-row">
        <input id="address" placeholder="Delivery Address">
        <input id="pincode" placeholder="Pincode">
    </div>

    <input id="phone" placeholder="Phone Number">

    <h3 style="color:#1976d2;margin-bottom:10px">Choose Payment Method</h3>

    <div class="method" onclick="selectMethod('COD', this)">Cash on Delivery</div>

    <div class="method" onclick="selectMethod('UPI', this)">
        UPI
        <input id="upiId" class="hidden" placeholder="Enter UPI ID">
    </div>

    <div class="method" onclick="selectMethod('CARD', this)">
        Debit / Credit Card
        <input id="cardNo" class="hidden" placeholder="Enter 8-digit Card Number" maxlength="8">
    </div>

    <button class="confirm-btn" onclick="confirmPayment()">Confirm Payment</button>
    <div id="msg" class="success"></div>
</div>

<script>
const pid = localStorage.getItem("currentUser");
const cart = JSON.parse(localStorage.getItem("cart")) || [];
const presIds = JSON.parse(localStorage.getItem("presIds")) || [];
const summary = document.getElementById("orderSummary");

let total = 0;
summary.innerHTML = cart.length === 0
    ? "No items found"
    : "<b>Medicines:</b><br>" + cart.map((c,i)=>{
        total += Number(c.price);
        return `${i+1}. ${c.name} - ₹${c.price}`;
      }).join("<br>") + `<br><b>Total: ₹<span id="totalAmt">${total}</span></b>`;

let selectedMethod = "";

function selectMethod(method, el){
    selectedMethod = method;
    document.querySelectorAll(".method").forEach(m=>m.classList.remove("active"));
    el.classList.add("active");

    upiId.classList.add("hidden");
    cardNo.classList.add("hidden");

    if(method==="UPI") upiId.classList.remove("hidden");
    if(method==="CARD") cardNo.classList.remove("hidden");

    document.getElementById("totalAmt").innerText =
        method==="COD" ? total + 20 : total;
}

function confirmPayment(){
    if(!selectedMethod) return alert("Please select payment method");

    const address = document.getElementById("address").value.trim();
    const pincode = document.getElementById("pincode").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if(!address || !phone) return alert("Fill all required fields");

    const parts = address.split(",").map(a=>a.trim()).filter(a=>a);
    if(parts.length < 3){
        return alert("Please enter Street, City, State in address");
    }

    if(!/^\d{6}$/.test(pincode)){
        return alert("Please enter valid 6-digit pincode");
    }

    if(selectedMethod==="UPI" && !upiId.value) return alert("Enter UPI ID");
    if(selectedMethod==="CARD" && cardNo.value.length!==8)
        return alert("Enter valid 8-digit card number");

    const status = selectedMethod==="COD" ? "Ordered" : "Paid";

    // 1️⃣ Save Order
    fetch("http://localhost:5000/api/order",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({
            pid,
            items:cart.map(c=>c.name),
            address,
            payment:selectedMethod,
            status,
            date:new Date().toLocaleString()
        })
    })
    .then(()=>{
        // 2️⃣ Mark prescriptions as used
        return fetch("http://localhost:5000/api/prescriptions/use",{
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ ids: presIds })
        });
    })
    .then(()=>{
        msg.innerText =
            status==="Paid"
            ? "✅ Payment Successful"
            : "✅ Order Placed Successfully";

        localStorage.removeItem("cart");
        localStorage.removeItem("presIds");

        setTimeout(()=>location.href="pharmacy.html",1200);
    });
}

function goBack(){
    location.href="pharmacy.html";
}
</script>

</body>
</html>
