<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>History | CareLife Hospital</title>

<style>
*{
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#eaf2ff,#f7fbff);
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

/* HEADER */
.header{
position:fixed;
top:0; left:0; right:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
background:#fff;
box-shadow:0 6px 20px rgba(0,0,0,.08);
z-index:10;
}

.left-group{
display:flex;
align-items:center;
gap:14px;
}

.back-arrow{
width:40px;
height:40px;
border-radius:50%;
background:#1976d2;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
transition:.3s;
}

.back-arrow:hover{
background:#125aa0;
transform:translateX(-3px);
}

/* LOGO */
.logo{
font-size:24px;
font-weight:700;
color:#1976d2;
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
border:3px solid #1976d2;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.header button{
padding:10px 22px;
border:none;
border-radius:22px;
background:#1976d2;
color:white;
font-size:15px;
cursor:pointer;
transition:.3s;
}

.header button:hover{
background:#125aa0;
}

/* LOGIN CARD */
.card{
background:rgba(255,255,255,.95);
padding:80px 110px;
border-radius:26px;
text-align:center;
box-shadow:0 30px 70px rgba(0,0,0,.15);
animation:fadeUp .8s ease;
min-width:560px;
}

.card p{
color:#555;
font-size:15px;
margin-bottom:28px;
}

.card button{
padding:12px 34px;
border:none;
border-radius:26px;
background:#1976d2;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.card button:hover{
background:#125aa0;
transform:scale(1.06);
}

/* ANIMATION */
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>

<body>

<!-- LOGIN ROLE CHECK -->
<script>

const role = localStorage.getItem("role");

/* doctor logged in → open doctor page */
if(role === "doctor"){
location.href = "doctor.html";
}

/* patient logged in → open patient history */
if(role === "patient"){
location.href = "patient.html";
}

</script>

<header class="header">

<div class="left-group">

<div class="back-arrow" onclick="history.back()">←</div>

<div class="logo">
<img src="hospital.png" alt="CareLife Logo">
CareLife
</div>

</div>

<button onclick="location.href='login.html'">Login</button>

</header>


<div class="card">

<h1 style="margin-bottom:18px;color:#1976d2;font-size:36px;">
Welcome to CareLife
</h1>

<p>Login to view appointment history</p>

<button onclick="location.href='login.html'">
Login
</button>

</div>

</body>
</html>
