<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doctor Fee Payment</title>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#e8f2ff,#fff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
animation:fadeIn 1s ease;
}

/* Page fade animation */
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.box{
width:400px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
animation:popBox 0.6s ease;
}

@keyframes popBox{
from{transform:scale(0.9);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h2{
margin-bottom:20px;
color:#1976d2;
}

.amount{
font-size:22px;
font-weight:bold;
margin-bottom:25px;
}

/* Payment option animation */
.option{
display:flex;
align-items:center;
gap:10px;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
transition:all 0.3s ease;
}

.option:hover{
background:#f2f7ff;
transform:scale(1.03);
border-color:#1976d2;
}

/* Button animation */
.pay-btn{
margin-top:20px;
width:100%;
padding:14px;
border:none;
background:#1976d2;
color:white;
font-size:16px;
border-radius:25px;
cursor:pointer;
transition:all 0.3s ease;
}

.pay-btn:hover{
background:#125ea8;
transform:scale(1.05);
}

.pay-btn:active{
transform:scale(0.95);
}

/* Success animation */
.success{
margin-top:15px;
color:green;
font-weight:600;
opacity:0;
}

.success.show{
animation:successPop 0.6s forwards;
}

@keyframes successPop{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="box">

<h2>Doctor Consultation Fee</h2>

<div class="amount">Amount: ₹200</div>

<label class="option">
<input type="radio" name="pay" value="Google Pay">
Google Pay
</label>

<label class="option">
<input type="radio" name="pay" value="PhonePe">
PhonePe
</label>

<label class="option">
<input type="radio" name="pay" value="Paytm">
Paytm
</label>

<button class="pay-btn" onclick="payNow()">Pay Now</button>

<div id="msg" class="success"></div>

</div>

<script>

function payNow(){

const method = document.querySelector('input[name="pay"]:checked');

if(!method){
alert("Please select payment method");
return;
}

const msg = document.getElementById("msg");

msg.innerText="✅ Payment Completed";
msg.classList.add("show");

localStorage.setItem("appointPayment","done");

setTimeout(()=>{
window.location.href="appointment.html";
},1500);

}

</script>

</body>
</html>
